<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Throttenix — Card Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060608;color:#e8e8e8;font-family:'Barlow',sans-serif;min-height:100vh;}

nav{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:56px;padding:0 24px;background:#0d0d0d;border-bottom:1px solid #1e1e1e;position:sticky;top:0;z-index:100;}
.nav-logo{grid-column:1;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:0.05em;display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:#e8ff00;}
.nav-links{grid-column:2;display:flex;gap:20px;align-items:center;}
.nav-links a{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#bbb;text-decoration:none;letter-spacing:0.05em;transition:color .2s;}
.nav-links a:hover{color:#fff;}
.nav-links a.active{color:#e8ff00;}
.nav-actions{grid-column:3;display:flex;gap:8px;justify-self:end;align-items:center;}
.btn-login{padding:7px 16px;border-radius:8px;border:1px solid #333;background:transparent;color:#ccc;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.btn-register{padding:7px 16px;border-radius:8px;border:none;background:#e8ff00;color:#000;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

.main{max-width:1200px;margin:0 auto;padding:24px 20px;}

/* 頁面標題 */
.page-header{margin-bottom:24px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;color:#fff;}
.page-sub{font-size:13px;color:#888;margin-top:4px;}

/* 等級說明列 */
.tier-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.tier-pill{padding:6px 14px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;border:1px solid;}
.tier-pill.active{color:#000;}

/* 排序按鈕 */
.sort-btn{padding:5px 12px;border-radius:6px;border:1px solid #2a2a2a;background:#111;color:#888;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em;}
.sort-btn:hover{border-color:#555;color:#ccc;}
.sort-btn.active{border-color:#e8ff00;color:#e8ff00;background:#1a1a00;}

/* 卡牌網格 */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,260px));gap:24px;justify-content:start;}
.card{width:260px;}

/* ── 共用卡片基礎 ── */
.card{border-radius:16px;overflow:visible;position:relative;cursor:pointer;transition:transform 0.3s cubic-bezier(.25,.8,.25,1);}
.card:hover{transform:translateY(-12px) scale(1.04);}
.card-inner{border-radius:16px;overflow:hidden;position:relative;width:100%;height:420px;display:flex;flex-direction:column;padding-bottom:56px;}
/* Background number: z-index 1 — behind all card content */
.c-num{position:absolute;top:4px;right:8px;font-size:52px;font-weight:900;line-height:1;z-index:1;pointer-events:none;font-family:'Barlow Condensed',sans-serif;opacity:0.07;color:#fff;}
.c-rarity{position:absolute;top:10px;left:12px;font-size:8px;font-weight:900;letter-spacing:0.12em;z-index:10;font-family:'Barlow Condensed',sans-serif;}
.c-art{height:100px;flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative;z-index:3;margin-top:24px;}
.c-emoji{font-size:52px;}
/* flex:1 fills the middle so there's no empty gap between stats and the bottom bar */
.c-info{padding:0 12px;position:relative;z-index:3;flex:1;}
.c-name{font-size:20px;font-weight:900;color:#fff;line-height:1;font-family:'Barlow Condensed',sans-serif;}
.c-team{font-size:8px;letter-spacing:0.06em;margin-top:1px;margin-bottom:8px;font-family:'Barlow Condensed',sans-serif;}
.c-stats{display:flex;flex-direction:column;gap:4px;}
.c-stat{display:flex;align-items:center;gap:5px;}
.c-sl{font-size:8px;color:#888;width:24px;letter-spacing:0.05em;font-family:'Barlow Condensed',sans-serif;}
.c-sb{flex:1;height:3px;background:#0a0a14;border-radius:2px;overflow:hidden;}
.c-sf{height:100%;border-radius:2px;}
.c-sv{font-size:8px;font-weight:700;width:14px;text-align:right;font-family:'Barlow Condensed',sans-serif;}
.c-divider{margin:6px 12px 0;height:1px;}
.c-sw{padding:4px 12px 0;position:relative;z-index:5;}
.c-sw-row{display:flex;align-items:flex-start;gap:4px;margin-bottom:3px;}
.c-sw-lbl{font-size:7px;font-weight:900;font-family:'Barlow Condensed',sans-serif;line-height:16px;flex-shrink:0;width:8px;}
.c-sw-tags{display:flex;flex-wrap:wrap;gap:2px;}
.c-sw-tag{font-size:8px;font-family:'Barlow Condensed',sans-serif;padding:1px 5px;border-radius:3px;letter-spacing:.04em;}
.c-sw-tag.str{background:rgba(68,255,136,.1);color:#44ff88;border:1px solid rgba(68,255,136,.25);}
.c-sw-tag.wk{background:rgba(255,80,80,.1);color:#ff6060;border:1px solid rgba(255,80,80,.25);}
.c-bottom{position:absolute;bottom:0;left:0;right:0;padding:8px 12px 12px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;z-index:15;border-top:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(2px);}
.c-wn{font-size:14px;font-weight:900;line-height:1;font-family:'Barlow Condensed',sans-serif;}
.c-wl{font-size:11px;color:#aaa;letter-spacing:0.08em;margin-top:2px;font-family:'Barlow Condensed',sans-serif;}
.c-ov{font-size:24px;font-weight:900;line-height:1;text-align:center;font-family:'Barlow Condensed',sans-serif;}
.c-ol{font-size:11px;color:#aaa;letter-spacing:0.08em;text-align:center;margin-top:2px;font-family:'Barlow Condensed',sans-serif;}
.c-od{font-size:14px;font-weight:900;line-height:1;text-align:right;font-family:'Barlow Condensed',sans-serif;}
.c-odl{font-size:11px;color:#aaa;letter-spacing:0.08em;text-align:right;margin-top:2px;font-family:'Barlow Condensed',sans-serif;}

/* ── 1. SILVERSTONE ── */
.silverstone .card-inner{background:linear-gradient(160deg,#131318 0%,#0e0e14 60%,#111116 100%);border:1px solid #2a2a35;}
.silverstone .s-top-line{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.15) 30%,rgba(255,255,255,0.25) 50%,rgba(255,255,255,0.15) 70%,transparent 100%);z-index:10;}
.silverstone .s-corner{position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(ellipse at top right,rgba(255,255,255,0.06) 0%,transparent 70%);z-index:3;}
.silverstone .s-sweep{position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,0.04) 50%,transparent 65%);animation:sweep 7s ease-in-out infinite;z-index:4;}
.silverstone .s-accent{position:absolute;left:0;top:20%;bottom:20%;width:2px;background:linear-gradient(to bottom,transparent,var(--team-color),transparent);z-index:10;}

/* ── 2. MONZA ── */
.monza .card-inner{background:linear-gradient(160deg,#0a1020 0%,#0c1628 60%,#0a1020 100%);border:1px solid #1a3a6a;}
.monza .m-top{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#3671C6 30%,#6ab0ff 50%,#3671C6 70%,transparent);z-index:10;}
.monza .m-glow{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:100px;height:60px;background:radial-gradient(ellipse,rgba(54,113,198,0.25) 0%,transparent 70%);z-index:3;}
.monza .m-sweep{position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(54,113,198,0.06) 50%,transparent 65%);animation:sweep 5s ease-in-out infinite;z-index:4;}
.monza .m-accent{position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,#3671C6 30%,#6ab0ff 50%,#3671C6 70%,transparent);z-index:10;}

/* ── 3. SUZUKA ── */
.suzuka .card-inner{background:#0a0a18;border:2px solid #534AB7;}
.suzuka .sz-diamond{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(127,119,221,0.07) 0px,rgba(127,119,221,0.07) 1px,transparent 1px,transparent 9px),repeating-linear-gradient(-45deg,rgba(127,119,221,0.07) 0px,rgba(127,119,221,0.07) 1px,transparent 1px,transparent 9px);z-index:2;}
.suzuka .sz-topglow{position:absolute;top:-15px;left:50%;transform:translateX(-50%);width:110px;height:55px;background:radial-gradient(ellipse,rgba(127,119,221,0.35) 0%,transparent 70%);animation:tg 2.5s ease-in-out infinite;z-index:3;}
.suzuka .sz-outer{position:absolute;inset:-2px;border-radius:18px;box-shadow:0 0 15px rgba(127,119,221,0.4),0 0 30px rgba(127,119,221,0.15);pointer-events:none;z-index:0;}
.suzuka .sz-sweep{position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(127,119,221,0.06) 50%,transparent 65%);animation:sweep 4s ease-in-out infinite;z-index:4;}
.suzuka .sz-sl{position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(to bottom,transparent,#7F77DD 30%,#AFA9EC 50%,#7F77DD 70%,transparent);animation:sl 2s ease-in-out infinite;z-index:10;}
.suzuka .sz-sr{position:absolute;top:0;right:0;width:2px;height:100%;background:linear-gradient(to bottom,transparent,#7F77DD 30%,#AFA9EC 50%,#7F77DD 70%,transparent);animation:sl 2s ease-in-out infinite 1s;z-index:10;}

/* ── 4. SPA ── */
.spa .card-inner{background:#060810;border:2px solid #00b8ff;}
.spa .sp-rainbow{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,0,128,0.07) 0%,rgba(255,200,0,0.09) 20%,rgba(0,255,128,0.07) 40%,rgba(0,150,255,0.09) 60%,rgba(180,0,255,0.07) 80%,rgba(255,0,128,0.05) 100%);animation:rb 3s linear infinite;mix-blend-mode:screen;z-index:2;}
.spa .sp-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(0,180,255,0.05) 0px,rgba(0,180,255,0.05) 1px,transparent 1px,transparent 14px),repeating-linear-gradient(90deg,rgba(0,180,255,0.05) 0px,rgba(0,180,255,0.05) 1px,transparent 1px,transparent 14px);z-index:3;}
.spa .sp-sweep{position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(0,200,255,0.08) 48%,rgba(255,255,255,0.05) 52%,transparent 70%);animation:sweep 2.5s ease-in-out infinite;z-index:4;}
.spa .sp-top{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ff0080,#ff8800,#ffff00,#00ff80,#00b8ff,#8800ff,#ff0080);animation:rb 2s linear infinite;z-index:10;}
.spa .sp-bot{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#8800ff,#00b8ff,#00ff80,#ffff00,#ff8800,#ff0080,#8800ff);animation:rb 2s linear infinite;z-index:10;}
.spa .sp-sl{position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(to bottom,#ff0080,#ffff00,#00ff80,#00b8ff,#8800ff);animation:rb 3s linear infinite;z-index:10;}
.spa .sp-sr{position:absolute;top:0;right:0;width:2px;height:100%;background:linear-gradient(to bottom,#8800ff,#00b8ff,#00ff80,#ffff00,#ff0080);animation:rb 3s linear infinite;z-index:10;}
.spa .sp-outer{position:absolute;inset:-3px;border-radius:19px;box-shadow:0 0 20px rgba(0,180,255,0.5),0 0 40px rgba(0,180,255,0.2);pointer-events:none;z-index:0;}

/* ── 5. MONACO ── */
.monaco .card-inner{background:#050400;border:2px solid #c9a84c;}
.monaco .c-art{margin-top:58px;}
.monaco .mc-diamond{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(201,168,76,0.09) 0px,rgba(201,168,76,0.09) 1px,transparent 1px,transparent 7px),repeating-linear-gradient(-45deg,rgba(201,168,76,0.09) 0px,rgba(201,168,76,0.09) 1px,transparent 1px,transparent 7px);z-index:2;}
.monaco .mc-rotate{position:absolute;inset:-60%;background:conic-gradient(transparent 0deg,rgba(201,168,76,0.12) 40deg,rgba(255,220,100,0.06) 80deg,transparent 120deg,rgba(201,168,76,0.10) 200deg,transparent 250deg,rgba(201,168,76,0.12) 320deg,transparent 360deg);animation:spin 6s linear infinite;z-index:3;}
.monaco .mc-rainbow{position:absolute;inset:0;background:linear-gradient(125deg,rgba(255,50,0,0) 0%,rgba(255,150,0,0.06) 20%,rgba(255,220,0,0.10) 35%,rgba(100,255,100,0.06) 50%,rgba(0,200,255,0.08) 65%,rgba(150,0,255,0.06) 80%,transparent 100%);animation:rb 4s linear infinite;mix-blend-mode:screen;z-index:4;}
.monaco .mc-sweep{position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.06) 48%,rgba(201,168,76,0.08) 52%,transparent 70%);animation:sweep 2s ease-in-out infinite;z-index:5;}
.monaco .mc-check-top{position:absolute;top:0;left:0;right:0;height:5px;background:repeating-linear-gradient(90deg,#c9a84c 0px,#c9a84c 9px,#050400 9px,#050400 18px);opacity:0.9;z-index:10;}
.monaco .mc-check-bot{position:absolute;bottom:0;left:0;right:0;height:5px;background:repeating-linear-gradient(90deg,#050400 0px,#050400 9px,#c9a84c 9px,#c9a84c 18px);opacity:0.9;z-index:10;}
.monaco .mc-outer{position:absolute;inset:-4px;border-radius:20px;box-shadow:0 0 25px rgba(201,168,76,0.6),0 0 50px rgba(201,168,76,0.3),0 0 80px rgba(201,168,76,0.1);pointer-events:none;z-index:0;}
.monaco .mc-sl{position:absolute;top:0;left:0;width:2px;height:100%;background:linear-gradient(to bottom,transparent,#c9a84c 30%,#fff 50%,#c9a84c 70%,transparent);animation:sl 1.8s ease-in-out infinite;z-index:10;}
.monaco .mc-sr{position:absolute;top:0;right:0;width:2px;height:100%;background:linear-gradient(to bottom,transparent,#c9a84c 30%,#fff 50%,#c9a84c 70%,transparent);animation:sl 1.8s ease-in-out infinite 0.9s;z-index:10;}
.monaco .mc-topglow{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:130px;height:70px;background:radial-gradient(ellipse,rgba(201,168,76,0.4) 0%,transparent 70%);animation:tg 2s ease-in-out infinite;z-index:3;}
.monaco .mc-p{position:absolute;width:2px;height:2px;border-radius:50%;background:#c9a84c;animation:pk 3s ease-in-out infinite;z-index:8;}
.monaco .mc-crown{position:absolute;top:4px;left:0;right:0;display:flex;justify-content:center;z-index:20;}

/* 動畫 */
@keyframes sweep{0%,100%{transform:translateX(-200%)}50%{transform:translateX(300%)}}
@keyframes tg{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes sl{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes rb{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pk{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><div class="logo-dot"></div>THROTTENIX</a>
  <div class="nav-links">

    <a href="/race">Race</a>
    <a href="/cards" class="active">Cards</a>
    <a href="/collection">Collection</a>
    <a href="/battle">Battle</a>
    <a href="/leaderboard">Leaderboard</a>
    <a href="/history">History</a>
    <a href="/halloffame">Hall of Fame</a>
    <a href="/car-explorer">Car Explorer</a>
    <a href="/profile">Profile</a>
  </div>
  <div class="nav-actions" id="nav-auth">
    <button class="btn-login" onclick="location.href='/'">Log In</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div class="page-title">Season Driver Cards</div>
    <div class="page-sub">Stats from real race data · Updated each race · Unlock higher tier cards</div>
  </div>

  <div class="tier-bar">
    <div class="tier-pill active" style="background:#1a1a22;color:#888;border-color:#333" onclick="filterTier('all',this)">All</div>
    <div class="tier-pill" style="background:#2a2a35;color:#ccc;border-color:#444" onclick="filterTier('silverstone',this)">Silverstone · Beginner</div>
    <div class="tier-pill" style="background:#0a1628;color:#6ab0ff;border-color:#1a3a6a" onclick="filterTier('monza',this)">Monza · Intermediate</div>
    <div class="tier-pill" style="background:#0a0a18;color:#AFA9EC;border-color:#534AB7" onclick="filterTier('suzuka',this)">Suzuka · Rare</div>
    <div class="tier-pill" style="background:#060810;color:#00ccff;border-color:#00b8ff" onclick="filterTier('spa',this)">Spa · Ultra Rare</div>
    <div class="tier-pill" style="background:#0a0800;color:#c9a84c;border-color:#c9a84c" onclick="filterTier('monaco',this)">Monaco · Legendary</div>
  </div>

  <!-- 排序列 -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#555;letter-spacing:0.1em">SORT</span>
    <button class="sort-btn active" onclick="sortCards('ovr',this)">Overall ▼</button>
    <button class="sort-btn" onclick="sortCards('win',this)">Win Rate</button>
    <button class="sort-btn" onclick="sortCards('odds',this)">Odds</button>
    <button class="sort-btn" onclick="sortCards('q',this)">Lap Speed</button>
    <button class="sort-btn" onclick="sortCards('t',this)">Tire Mgmt</button>
    <button class="sort-btn" onclick="sortCards('w',this)">Wet Weather</button>
    <button class="sort-btn" onclick="sortCards('o',this)">Overtaking</button>
    <button class="sort-btn" onclick="sortCards('team',this)">Team</button>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>

</div>

<script src="/static/assets/js/app.js"></script>
<script>
let DRIVERS = [];
let currentSort = 'ovr';
let sortAsc = false;
let currentTierFilter = 'all';

const SW_BANK = {
  VER:{ str:['Qualifying','Wet Weather','Race Craft'],       wk:['Tyre Conservation','Street Pressure'] },
  HAM:{ str:['Wet Weather','Starts','Race Pace'],            wk:['Tyre Management'] },
  NOR:{ str:['High-Speed Corners','Tyre Mgmt','Lap 1'],      wk:['Wheel-to-Wheel','Wet Starts'] },
  LEC:{ str:['Qualifying','Street Circuits','Lap 1'],        wk:['Tyre Management','Race Starts'] },
  SAI:{ str:['Consistency','Tyre Management','Strategy'],    wk:['Qualifying Pace'] },
  RUS:{ str:['Tyre Management','Consistency','Strategy'],    wk:['Qualifying Pace','Overtaking'] },
  PIA:{ str:['High-Speed Corners','Race Pace'],              wk:['Qualifying','Experience'] },
  ALO:{ str:['Race Craft','Overtaking','Dirty Air'],         wk:['Tyre Warm-up'] },
  PER:{ str:['Tyre Management','Street Circuits'],           wk:['Qualifying','Pressure'] },
  STR:{ str:['Rain Pace','Strategy'],                        wk:['Qualifying','Consistency'] },
  GAS:{ str:['Qualifying Pace','Street Circuits'],           wk:['Race Starts','Tyre Wear'] },
  OCO:{ str:['Qualifying','Street Circuits'],                wk:['Wheel-to-Wheel','Strategy'] },
  BOT:{ str:['Qualifying Pace','Clean Air Pace'],            wk:['Race Craft','Wet Weather'] },
  TSU:{ str:['Wet Weather','Overtaking'],                    wk:['Consistency','Strategy'] },
  HUL:{ str:['Tyre Management','Race Craft'],                wk:['Qualifying','Team Orders'] },
  MAG:{ str:['Aggression','Dirty Air Defence'],              wk:['Tyre Wear','Consistency'] },
  ALB:{ str:['Consistency','Smooth Driving'],                wk:['Qualifying Pace','Overtaking'] },
  BEA:{ str:['Wet Weather','Corners'],                       wk:['Experience','Pressure'] },
  ANT:{ str:['Qualifying','Pace'],                           wk:['Race Craft','Experience'] },
  DOO:{ str:['Smooth Driving','Consistency'],                wk:['Qualifying','Wet Weather'] },
  HAD:{ str:['Overtaking','Aggression'],                     wk:['Tyre Management','Strategy'] },
  LAW:{ str:['Race Craft','Consistency'],                    wk:['Qualifying','Street Circuits'] },
};
const SW_DEFAULT = { str:['Race Pace'], wk:['Consistency'] };

// Load real drivers from API + 2024 historical stats
async function loadDrivers() {
  try {
    const teamColors = {'McLaren':'#F47600','Red Bull Racing':'#3671C6','Ferrari':'#E8002D','Mercedes':'#27F4D2','Aston Martin':'#358C75','Alpine':'#FF87BC','Williams':'#64C4FF','Haas':'#B6BABD','Racing Bulls':'#6692FF','RB':'#6692FF','Kick Sauber':'#52E252','Audi':'#52E252'};

    // Fetch in parallel: OpenF1 drivers + 2024 stats
    const [data, histData] = await Promise.all([
      api('/api/drivers'),
      api('/api/drivers/stats').catch(()=>({drivers:[]})),
    ]);
    const drivers = data.drivers || [];
    // Build a stats map keyed by family name or driver_id
    const histMap = {};
    for (const h of (histData.drivers || [])) {
      histMap[h.driver_id] = h;
      if (h.name) histMap[h.name.split(' ').pop().toLowerCase()] = h;
    }

    const cards = await Promise.all(drivers.map(d => api(`/api/drivers/${d.driver_id}/card`).catch(() => null)));

    DRIVERS = drivers.map((d, i) => {
      const card = cards[i];
      const s = card?.stats || {};
      // Enrich with historical data if available
      const hist = histMap[d.driver_id] || histMap[d.name?.split(' ').pop()?.toLowerCase()] || {};
      const ovr = s.overall || 50;
      const color = hist.color || teamColors[card?.team || d.team] || '#888';
      const odds = card?.odds || 10.0;
      // win% from real data if available, else derive from odds
      const win = hist.win_rate != null ? Math.round(hist.win_rate) : (odds ? Math.round(1/odds*100) : 5);

      let tier = 'silverstone';
      if (ovr >= 88) tier = 'monaco';
      else if (ovr >= 83) tier = 'spa';
      else if (ovr >= 78) tier = 'suzuka';
      else if (ovr >= 72) tier = 'monza';

      const headshot = card?.headshot_url || d.headshot_url || '';

      const lastName = d.name?.split(' ').pop() || '?';
      const code3 = lastName.slice(0,3).toUpperCase();
      const sw = SW_BANK[code3] || SW_DEFAULT;
      return {
        num: d.number || '?',
        name: lastName,
        fullName: d.name || '?',
        team: card?.team || d.team || '',
        color, emoji: '🏎', tier, headshot,
        stats: {q: s.qualifying||50, t: s.tire_management||50, w: s.wet_weather||50, o: s.overtaking||50},
        ovr, win, odds: Number(odds).toFixed(1),
        driver_id: d.driver_id,
        str: sw.str, wk: sw.wk,
        // real 2024 data
        pts2024: hist.points || 0,
        wins2024: hist.wins || 0,
        podiums2024: hist.podiums || 0,
        champPos: hist.championship_pos || 99,
        podium_rate: hist.podium_rate || 0,
        avg_grid: hist.avg_grid || '-',
        last5: hist.last5_points || [],
      };
    });

    renderCards();
  } catch(e) {
    document.getElementById('cardsGrid').innerHTML = '<p style="color:#888;text-align:center;padding:40px">Loading...</p>';
  }
}
loadDrivers();

function buildCard(d) {
  const t = TIER_CONFIG[d.tier];
  const emojiFilter = {
    silverstone:`drop-shadow(0 4px 10px ${d.color}40)`,
    monza:`drop-shadow(0 0 10px ${d.color}99)`,
    suzuka:`drop-shadow(0 0 14px rgba(127,119,221,0.9))`,
    spa:`drop-shadow(0 0 16px rgba(0,200,255,1))`,
    monaco:`drop-shadow(0 0 20px rgba(201,168,76,1)) drop-shadow(0 0 40px rgba(255,200,100,0.6))`,
  }[d.tier];

  const extras = {
    silverstone:`
      <div class="s-top-line"></div>
      <div class="s-corner"></div>
      <div class="s-sweep"></div>
      <div class="s-accent" style="--team-color:${d.color}"></div>`,
    monza:`
      <div class="m-top"></div>
      <div class="m-glow"></div>
      <div class="m-sweep"></div>
      <div class="m-accent"></div>`,
    suzuka:`
      <div class="sz-outer"></div>
      <div class="sz-diamond"></div>
      <div class="sz-topglow"></div>
      <div class="sz-sweep"></div>
      <div class="sz-sl"></div>
      <div class="sz-sr"></div>`,
    spa:`
      <div class="sp-outer"></div>
      <div class="sp-rainbow"></div>
      <div class="sp-grid"></div>
      <div class="sp-sweep"></div>
      <div class="sp-top"></div>
      <div class="sp-bot"></div>
      <div class="sp-sl"></div>
      <div class="sp-sr"></div>`,
    monaco:`
      <div class="mc-outer"></div>
      <div class="mc-diamond"></div>
      <div class="mc-rotate"></div>
      <div class="mc-rainbow"></div>
      <div class="mc-sweep"></div>
      <div class="mc-check-top"></div>
      <div class="mc-check-bot"></div>
      <div class="mc-sl"></div>
      <div class="mc-sr"></div>
      <div class="mc-topglow"></div>
      <div class="mc-p" style="top:15%;left:10%;animation-delay:0s"></div>
      <div class="mc-p" style="top:28%;right:12%;animation-delay:0.7s"></div>
      <div class="mc-p" style="top:50%;left:7%;animation-delay:1.4s"></div>
      <div class="mc-p" style="top:70%;right:9%;animation-delay:0.4s"></div>
      <div class="mc-crown">
        <svg width="40" height="32" viewBox="0 0 40 32" style="position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20;">
          <path d="M4 26 L4 16 L10 22 L20 8 L30 22 L36 16 L36 26 Z" fill="#c9a84c" stroke="#f0d070" stroke-width="0.8"/>
          <rect x="4" y="24" width="32" height="4" rx="1" fill="#c9a84c" stroke="#f0d070" stroke-width="0.8"/>
          <circle cx="20" cy="7" r="2.5" fill="#f0d070"/>
          <circle cx="10" cy="21" r="2" fill="#f0d070"/>
          <circle cx="30" cy="21" r="2" fill="#f0d070"/>
          <circle cx="12" cy="26" r="1.2" fill="#fff" opacity="0.8"/>
          <circle cx="20" cy="26" r="1.2" fill="#fff" opacity="0.8"/>
          <circle cx="28" cy="26" r="1.2" fill="#fff" opacity="0.8"/>
          <path d="M4 26 L4 16 L10 22 L20 8 L30 22 L36 16 L36 26 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
        </svg>
      </div>`,
  }[d.tier];

  const monacoArtStyle = '';  // handled by CSS .monaco .c-art
  const monacoFlag = d.tier==='monaco'?`
    <div style="display:flex;justify-content:center;margin-bottom:5px;position:relative;z-index:10;">
      <svg width="80" height="6" viewBox="0 0 80 6">
        <rect x="0" y="0" width="8" height="6" fill="#c9a84c" opacity="0.8"/><rect x="8" y="0" width="8" height="6" fill="#050400"/>
        <rect x="16" y="0" width="8" height="6" fill="#c9a84c" opacity="0.8"/><rect x="24" y="0" width="8" height="6" fill="#050400"/>
        <rect x="32" y="0" width="8" height="6" fill="#c9a84c" opacity="0.8"/><rect x="40" y="0" width="8" height="6" fill="#050400"/>
        <rect x="48" y="0" width="8" height="6" fill="#c9a84c" opacity="0.8"/><rect x="56" y="0" width="8" height="6" fill="#050400"/>
        <rect x="64" y="0" width="8" height="6" fill="#c9a84c" opacity="0.8"/><rect x="72" y="0" width="8" height="6" fill="#050400"/>
      </svg>
    </div>`:'';

  const emojiAnim = d.tier==='monaco'?`animation:float 3s ease-in-out infinite;`:'';
  const glowCircle = ['suzuka','spa','monaco'].includes(d.tier)?`
    <div style="position:absolute;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,${{
      suzuka:'rgba(127,119,221,0.2)',spa:'rgba(0,200,255,0.2)',monaco:'rgba(201,168,76,0.3)'
    }[d.tier]} 0%,transparent 70%);animation:tg 2s ease-in-out infinite;"></div>`:'';

  const ovrStyle = `color:${t.ovrColor};${t.ovrShadow?`text-shadow:${t.ovrShadow};`:''}${d.tier==='monaco'?'font-size:28px;':''}`;
  const rarityTop = d.tier==='monaco'?'top:46px;':'';

  return `
    <div class="card ${d.tier}" data-tier="${d.tier}">
      <div class="card-inner">
        ${extras}
        <span class="c-rarity" style="${rarityTop}color:${t.ovrColor};${d.tier==='monaco'?'text-shadow:0 0 10px rgba(201,168,76,1);':''}">${t.label}</span>
        <span class="c-num">${d.num}</span>
        <div class="c-art" style="z-index:5;${monacoArtStyle}">
          ${glowCircle}
          ${d.headshot ? `<img src="${d.headshot}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid ${d.color};filter:${emojiFilter};${emojiAnim}" onerror="this.outerHTML='<span class=c-emoji style=filter:${emojiFilter}>${d.emoji}</span>'">` : `<span class="c-emoji" style="filter:${emojiFilter};${emojiAnim}">${d.emoji}</span>`}
        </div>
        ${monacoFlag}
        <div class="c-info">
          <div class="c-name" style="${d.tier==='monaco'?'text-shadow:0 0 20px rgba(201,168,76,0.7);':''}">${d.name}</div>
          <div class="c-team" style="color:${t.teamColor(d.color)}">${d.team}</div>
          <div class="c-stats">
            ${['SPD','TYR','WET','OVT'].map((sl,i)=>{
              const vals = [d.stats.q,d.stats.t,d.stats.w,d.stats.o];
              return `<div class="c-stat">
                <span class="c-sl" style="${d.tier==='monaco'||d.tier==='spa'||d.tier==='suzuka'?`color:${t.ovrColor};`:''}">${sl}</span>
                <div class="c-sb"><div class="c-sf" style="width:${vals[i]}%;background:${t.statColor};${d.tier!=='silverstone'?`box-shadow:0 0 4px ${t.ovrColor}44;`:''}"></div></div>
                <span class="c-sv" style="color:${t.svColor}">${vals[i]}</span>
              </div>`;
            }).join('')}
          </div>
        </div>
        ${d.str && d.wk ? `
        <div class="c-sw">
          <div class="c-sw-row">
            <span class="c-sw-lbl" style="color:#44ff88">▲</span>
            <div class="c-sw-tags">${d.str.map(s=>`<span class="c-sw-tag str">${s}</span>`).join('')}</div>
          </div>
          <div class="c-sw-row">
            <span class="c-sw-lbl" style="color:#ff6060">▼</span>
            <div class="c-sw-tags">${d.wk.map(w=>`<span class="c-sw-tag wk">${w}</span>`).join('')}</div>
          </div>
        </div>` : ''}
        <div class="c-divider" style="background:${t.divider};"></div>
        ${d.last5?.length ? `<div style="padding:4px 12px 0;display:flex;align-items:center;gap:3px;position:relative;z-index:5;">
          <span style="font-size:7px;color:#666;letter-spacing:.05em;font-family:'Barlow Condensed',sans-serif;margin-right:2px">L5</span>
          ${(()=>{const mx=Math.max(...d.last5,1);return d.last5.map(p=>`<div style="width:8px;height:${Math.max(3,Math.round(p/mx*18))}px;background:${p>0?t.statColor:'#222'};border-radius:1px;align-self:flex-end;${p>0?`box-shadow:0 0 3px ${t.ovrColor}44;`:''}"></div>`).join('')})()}
        </div>` : ''}
        <div class="c-bottom">
          <div>
            <div class="c-wn" style="color:${t.winColor};${d.tier==='monaco'?'text-shadow:0 0 12px rgba(0,255,136,1);':''}">${d.win}%</div>
            <div class="c-wl">WIN</div>
          </div>
          <div>
            <div class="c-ov" style="${ovrStyle}">${d.ovr}</div>
            <div class="c-ol">OVR</div>
          </div>
          <div>
            ${d.pts2024 ? `<div class="c-od" style="color:${t.oddsColor};${d.tier==='monaco'?'text-shadow:0 0 12px rgba(255,255,0,1);':''}">${d.pts2024}</div><div class="c-odl">PTS</div>` : `<div class="c-od" style="color:${t.oddsColor}">${d.odds}x</div><div class="c-odl">ODDS</div>`}
          </div>
        </div>
      </div>
    </div>`;
}

function renderCards(){
  const grid = document.getElementById('cardsGrid');
  let list = currentTierFilter === 'all' ? [...DRIVERS] : DRIVERS.filter(d => d.tier === currentTierFilter);

  // Sort
  if (currentSort === 'team') {
    list.sort((a, b) => sortAsc ? a.team.localeCompare(b.team) : b.team.localeCompare(a.team));
  } else if (currentSort === 'odds') {
    // odds: lower = better, so default desc means low odds first
    list.sort((a, b) => sortAsc ? parseFloat(b.odds) - parseFloat(a.odds) : parseFloat(a.odds) - parseFloat(b.odds));
  } else {
    const key = {ovr:'ovr', win:'win', q:'q', t:'t', w:'w', o:'o'}[currentSort];
    if (key) {
      list.sort((a, b) => {
        const va = key.length === 1 ? (a.stats[key] || 0) : (a[key] || 0);
        const vb = key.length === 1 ? (b.stats[key] || 0) : (b[key] || 0);
        return sortAsc ? va - vb : vb - va;
      });
    }
  }

  // If sorted by team, insert team headers
  if (currentSort === 'team') {
    let html = '';
    let lastTeam = '';
    const teamColors = {'McLaren':'#F47600','Red Bull Racing':'#3671C6','Ferrari':'#E8002D','Mercedes':'#27F4D2','Aston Martin':'#358C75','Alpine':'#FF87BC','Williams':'#64C4FF','Haas':'#B6BABD','Racing Bulls':'#6692FF','Audi':'#52E252'};
    list.forEach(d => {
      if (d.team !== lastTeam) {
        const tc = teamColors[d.team] || '#888';
        html += `<div style="grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:8px 0;margin-top:${lastTeam?'12px':'0'}">
          <div style="width:4px;height:24px;border-radius:2px;background:${tc}"></div>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:${tc};letter-spacing:0.04em">${d.team}</span>
          <div style="flex:1;height:1px;background:${tc}22"></div>
        </div>`;
        lastTeam = d.team;
      }
      html += buildCard(d);
    });
    grid.innerHTML = html;
  } else {
    grid.innerHTML = list.map(buildCard).join('');
  }
}

function filterTier(tier, btn){
  document.querySelectorAll('.tier-pill').forEach(p => {
    p.classList.remove('active');
    p.style.opacity = '0.6';
  });
  btn.classList.add('active');
  btn.style.opacity = '1';
  currentTierFilter = tier;
  renderCards();
}

function sortCards(key, btn) {
  // If clicking same sort, toggle direction
  if (currentSort === key) {
    sortAsc = !sortAsc;
  } else {
    currentSort = key;
    sortAsc = false; // default: high to low
  }

  // Reset tier filter to All so sort applies to every card
  currentTierFilter = 'all';
  document.querySelectorAll('.tier-pill').forEach(p => {
    p.classList.remove('active');
    p.style.opacity = '0.6';
  });
  const allPill = document.querySelector('.tier-pill[onclick*="all"]');
  if (allPill) { allPill.classList.add('active'); allPill.style.opacity = '1'; }

  // Update button labels
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.classList.remove('active');
    b.textContent = b.textContent.replace(/ [▲▼]/g, '');
  });
  btn.classList.add('active');
  btn.textContent = btn.textContent.replace(/ [▲▼]/g, '') + (sortAsc ? ' ▲' : ' ▼');

  renderCards();
}

renderCards();
