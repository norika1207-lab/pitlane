<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Throttenix — Card Collection</title>
<link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/assets/css/style.css">
<link rel="stylesheet" href="/static/assets/css/f1card.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d0d; color: #e8e8e8; font-family: 'Barlow', sans-serif; min-height: 100vh; }
.main { max-width: 1400px; margin: 0 auto; padding: 96px 24px 80px; }

/* ─── PAGE HEADER ─── */
.page-header { margin-bottom: 24px; }
.page-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase; color: #e8ff00; margin-bottom: 6px; }
.page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 900; color: #fff; }
.page-sub { font-size: 13px; color: #666; margin-top: 6px; }

/* ─── SEASON TABS ─── */
.season-bar {
  display: flex; align-items: center; gap: 0;
  border-bottom: 1px solid #1e1e1e; margin-bottom: 32px; overflow-x: auto;
}
.s-tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: #555; font-family: 'Barlow Condensed', sans-serif; font-size: 13px;
  font-weight: 700; letter-spacing: .06em; padding: 12px 20px;
  cursor: pointer; white-space: nowrap; transition: all .18s;
  text-transform: uppercase;
}
.s-tab:hover { color: #aaa; }
.s-tab.active { color: #e8ff00; border-bottom-color: #e8ff00; }
.s-tab .s-champ { font-size: 9px; color: #555; display: block; margin-top: 1px; font-weight: 400; letter-spacing: .04em; }
.s-tab.active .s-champ { color: #888; }

/* ─── STATS ROW ─── */
.col-stats-row { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
.col-stat-pill { background: #111; border: 1px solid #1e1e1e; border-radius: 8px;
  padding: 9px 16px; display: flex; flex-direction: column; gap: 2px; }
.csp-num { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 900; color: #e8ff00; line-height: 1; }
.csp-label { font-size: 9px; color: #555; letter-spacing: .08em; font-family: 'Barlow Condensed', sans-serif; }

/* ─── ALBUM GRID ─── */
.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 80px 40px;
  padding: 24px 0;
}
.col-loading { grid-column: 1/-1; text-align: center; padding: 60px;
  color: #444; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: .1em; }

/* ─── CARD UNIT ─── */
.col-unit { display: flex; flex-direction: column; align-items: center; gap: 14px; cursor: pointer; }
.col-atag {
  font-size: 10px; font-weight: 800; letter-spacing: .12em; padding: 5px 16px;
  border-radius: 20px; font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase; box-shadow: 0 2px 8px rgba(0,0,0,.5);
}

/* ─── FRAME — sizes EXACTLY to F1 card (260×420), acrylic is added OVER it ─── */
.col-frame {
  position: relative;
  width: 260px; height: 420px;           /* match F1 card native dimensions */
  margin: 32px;                          /* breathing room for acrylic overlay */
  will-change: transform; transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.25,.8,.25,1);
}
/* The F1 card inside our frame — disable its own hover transform so the
   acrylic slab stays aligned. The whole unit gets tilt via JS instead. */
.col-frame .card          { width: 260px !important; cursor: default; }
.col-frame .card:hover    { transform: none !important; }
.col-frame .card-inner    { height: 420px; }

.col-frame::after {
  content: ''; position: absolute; bottom: -34px; left: 8%; right: 8%;
  height: 18px; background: radial-gradient(ellipse, rgba(0,0,0,.75), transparent 70%);
  filter: blur(10px); z-index: -1; transition: all .5s;
}
.col-unit:hover .col-frame::after { bottom: -48px; left: 12%; right: 12%; opacity: .9; }

/* ─── ACRYLIC SLAB — PSA-style display case OVER the F1 card ─── */
.col-acrylic {
  position: absolute; top: -34px; left: -34px; right: -34px; bottom: -34px;
  border-radius: 22px; z-index: 20; pointer-events: none;
  background: linear-gradient(135deg,
    rgba(255,255,255,.26) 0%, rgba(255,255,255,.08) 18%,
    rgba(255,255,255,.01) 42%, rgba(255,255,255,.01) 58%,
    rgba(255,255,255,.06) 78%, rgba(255,255,255,.20) 100%);
  border: 1.5px solid rgba(255,255,255,.45);
  box-shadow:
    0 18px 48px rgba(0,0,0,.7),
    0 6px 14px rgba(0,0,0,.35),
    inset 0 2px 0 rgba(255,255,255,.35),
    inset 2px 0 0 rgba(255,255,255,.12),
    inset -2px 0 0 rgba(0,0,0,.12),
    inset 0 -2px 0 rgba(0,0,0,.20);
}
.col-acrylic::before {
  content: ''; position: absolute; top: 10px; left: 38px; right: 38px; height: 11px;
  background: linear-gradient(to bottom, rgba(255,255,255,.40), transparent);
  border-radius: 7px; filter: blur(2px);
}
.col-acrylic::after {
  content: ''; position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  width: 45%; height: 6px;
  background: linear-gradient(to top, rgba(255,255,255,.22), transparent);
  border-radius: 4px; filter: blur(2px);
}
.col-mag {
  position: absolute; width: 11px; height: 11px; border-radius: 50%;
  background: radial-gradient(circle at 38% 32%, #e0e0e0 0%, #b0b0b0 35%, #808080 65%, #505050 100%);
  box-shadow: 0 1px 3px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.45);
  z-index: 21;
}
.col-mag::after {
  content: ''; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); width: 3px; height: 3px; border-radius: 50%;
  background: radial-gradient(#333, #111);
}
.col-mag.tl { top: 12px; left: 12px; }
.col-mag.tr { top: 12px; right: 12px; }
.col-mag.bl { bottom: 12px; left: 12px; }
.col-mag.br { bottom: 12px; right: 12px; }

/* ─── BACKGROUND GLOW for premium tiers ─── */
.col-glow {
  position: absolute; top: -40px; left: -40px; right: -40px; bottom: -40px;
  border-radius: 28px; pointer-events: none; z-index: -1; transition: opacity .4s;
}

/* ─── OWNED BADGE ─── */
.col-owned-badge {
  position: absolute; top: -14px; right: -14px; z-index: 30;
  background: #e8ff00; color: #000;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 900; letter-spacing: .08em;
  padding: 4px 10px; border-radius: 12px;
  box-shadow: 0 2px 12px rgba(232,255,0,.5);
  transform: rotate(6deg);
}

/* ─── BELOW CARD ─── */
.col-lv { text-align: center; width: 220px; }
.col-lv-t { font-size: 9px; font-weight: 700; letter-spacing: .08em; margin-bottom: 4px;
            font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }
.col-lv-bg { width: 100%; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
.col-lv-f  { height: 100%; border-radius: 2px; transition: width .6s ease; }

.col-alabel { font-size: 11px; color: #444; letter-spacing: .06em;
              font-family: 'Barlow Condensed', sans-serif; text-align: center; }

/* ─── EMPTY SLOT (for cards not yet earned) ─── */
.col-empty {
  width: 260px; height: 420px; border-radius: 16px;
  border: 1px dashed #222; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: #2a2a2a; background: rgba(0,0,0,.3);
}
.col-empty-icon { font-size: 32px; opacity: .4; }
.col-empty-text { font-size: 10px; letter-spacing: .12em;
                  font-family: 'Barlow Condensed', sans-serif;
                  text-transform: uppercase; color: #333; }
</style>
</head>

<div class="main">
  <div class="page-header">
    <div class="page-eyebrow">Card Album · F1 Drivers</div>
    <div class="page-title">Collection</div>
    <div class="page-sub">Each F1 card sits inside an acrylic display slab. OWNED cards are earned by placing bets.</div>
  </div>

  <div class="season-bar" id="seasonBar"></div>

  <div class="album-grid" id="albumGrid">
    <div class="col-loading">LOADING DRIVERS…</div>
  </div>
</div>

<script src="/static/assets/js/app.js"></script>
<script src="/static/assets/js/f1card.js"></script>
<script>
/* ════════════════════════════════════════════════════════
   COLLECTION — wraps real F1 cards (shared f1card.js) in
   an acrylic display slab with owned badge + XP bar
════════════════════════════════════════════════════════ */

/* Owned-card DB (bets-won cards). Seed data for demo. */
const OWNED_CARDS = new Set([
  'ver_2026', 'nor_2026', 'rus_2026',
]);

const SEASON_META = {
  2020: { champ:'Hamilton', races:17 },
  2021: { champ:'Verstappen', races:22 },
  2022: { champ:'Verstappen', races:22 },
  2023: { champ:'Verstappen', races:22 },
  2024: { champ:'Verstappen', races:24 },
  2025: { champ:'Norris',    races:24 },
  2026: { champ:'Antonelli', races:3  },
};

const SW_BANK = {
  VER:{ str:['Qualifying','Wet Weather','Race Craft'],      wk:['Tyre Conservation','Street Pressure'] },
  HAM:{ str:['Wet Weather','Starts','Race Pace'],           wk:['Tyre Management'] },
  NOR:{ str:['High-Speed Corners','Tyre Mgmt','Lap 1'],     wk:['Wheel-to-Wheel','Wet Starts'] },
  LEC:{ str:['Qualifying','Street Circuits','Lap 1'],       wk:['Tyre Management','Race Starts'] },
  SAI:{ str:['Consistency','Tyre Management','Strategy'],   wk:['Qualifying Pace'] },
  RUS:{ str:['Tyre Management','Consistency','Strategy'],   wk:['Qualifying Pace','Overtaking'] },
  PIA:{ str:['High-Speed Corners','Race Pace'],             wk:['Qualifying','Experience'] },
  ALO:{ str:['Race Craft','Overtaking','Dirty Air'],        wk:['Tyre Warm-up'] },
  PER:{ str:['Tyre Management','Street Circuits'],          wk:['Qualifying','Pressure'] },
  STR:{ str:['Rain Pace','Strategy'],                       wk:['Qualifying','Consistency'] },
  GAS:{ str:['Qualifying Pace','Street Circuits'],          wk:['Race Starts','Tyre Wear'] },
  OCO:{ str:['Qualifying','Street Circuits'],               wk:['Wheel-to-Wheel','Strategy'] },
  BOT:{ str:['Qualifying Pace','Clean Air Pace'],           wk:['Race Craft','Wet Weather'] },
  TSU:{ str:['Wet Weather','Overtaking'],                   wk:['Consistency','Strategy'] },
  HUL:{ str:['Tyre Management','Race Craft'],               wk:['Qualifying','Team Orders'] },
  MAG:{ str:['Aggression','Dirty Air Defence'],             wk:['Tyre Wear','Consistency'] },
  ALB:{ str:['Consistency','Smooth Driving'],               wk:['Qualifying Pace','Overtaking'] },
  ANT:{ str:['Qualifying','Pace'],                          wk:['Race Craft','Experience'] },
  BEA:{ str:['Wet Weather','Corners'],                      wk:['Experience','Pressure'] },
  HAD:{ str:['Overtaking','Aggression'],                    wk:['Tyre Management','Strategy'] },
  LAW:{ str:['Race Craft','Consistency'],                   wk:['Qualifying','Street Circuits'] },
  BOR:{ str:['Raw Pace','Adaptability'],                    wk:['Consistency','Experience'] },
  COL:{ str:['Race Pace','Wet Weather'],                    wk:['Qualifying','Strategy'] },
  DOO:{ str:['Smooth Driving','Consistency'],               wk:['Qualifying','Wet Weather'] },
  ZHO:{ str:['Tyre Management'],                            wk:['Qualifying','Race Pace'] },
  SAR:{ str:['Smooth Driving'],                             wk:['Qualifying','Consistency'] },
  VET:{ str:['Race Craft','Tyre Management','Tech Feedback'], wk:['Wheel-to-Wheel','Aggression'] },
  RIC:{ str:['Late Braking','Overtaking','Wet Weather'],    wk:['Tyre Management','Qualifying'] },
  RAI:{ str:['Consistency','Smooth Driving'],               wk:['Qualifying Pace','Motivation'] },
  MSC:{ str:['Rain Pace','Tyre Management'],                wk:['Consistency','Racecraft'] },
  GRO:{ str:['Race Pace'],                                  wk:['Consistency','Crash Rate'] },
  GIO:{ str:['Consistency'],                                wk:['Qualifying','Overtaking'] },
  KVY:{ str:['Race Craft'],                                 wk:['Consistency','Wet Weather'] },
  MAZ:{ str:['Aggression'],                                 wk:['Race Craft','Consistency'] },
  LAT:{ str:['Consistency'],                                wk:['Qualifying','Race Pace'] },
  KUB:{ str:['Experience','Race Craft'],                    wk:['Physical Fitness','Pace'] },
  DEV:{ str:['Simulator Pace','Strategy'],                  wk:['Race Craft','Wet Weather'] },
};
const SW_DEFAULT = { str:['Race Pace','Consistency'], wk:['Qualifying'] };

/* Tier assignment by championship position */
function posTier(pos) {
  if (pos === 1)  return 'monaco';
  if (pos <= 3)   return 'spa';
  if (pos <= 8)   return 'suzuka';
  if (pos <= 15)  return 'monza';
  return 'silverstone';
}

/* Derive stat values from standings */
function deriveStats(pos, wins, pts, maxPts, totalRaces) {
  const f = Math.max(0, Math.min(1, pts / Math.max(maxPts, 1)));
  const winRate = wins / Math.max(totalRaces, 1);
  return {
    q: Math.min(99, Math.round(50 + f*45 + (pos===1?4:0))),
    t: Math.min(99, Math.round(48 + f*42 + (wins>5?3:0))),
    w: Math.min(99, Math.round(52 + f*38 + (winRate>0.3?5:0))),
    o: Math.min(99, Math.round(50 + winRate*120 + f*30)),
  };
}

/* Tier label pill config */
const TIER_PILL = {
  silverstone: { label:'SILVERSTONE · STARTER', c:'#aaa',    bg:'#111',    bc:'#333'    },
  monza:       { label:'MONZA · ADVANCED',      c:'#6ab0ff', bg:'#0a1020', bc:'#1a3a6a' },
  suzuka:      { label:'SUZUKA · RARE',         c:'#AFA9EC', bg:'#0a0a18', bc:'#534AB7' },
  spa:         { label:'SPA · HOLOGRAPHIC',     c:'#00ccff', bg:'#060810', bc:'#00b8ff' },
  monaco:      { label:'MONACO · LEGENDARY',    c:'#c9a84c', bg:'#0a0700', bc:'#c9a84c' },
};

const TIER_GLOW = {
  silverstone: '',
  monza:       'box-shadow:0 0 28px rgba(54,113,198,.22),0 0 56px rgba(54,113,198,.08);',
  suzuka:      'box-shadow:0 0 32px rgba(127,119,221,.32),0 0 64px rgba(127,119,221,.12);',
  spa:         'box-shadow:0 0 36px rgba(0,180,255,.38),0 0 72px rgba(0,180,255,.14);',
  monaco:      'box-shadow:0 0 44px rgba(201,168,76,.50),0 0 88px rgba(201,168,76,.25),0 0 140px rgba(201,168,76,.10);',
};

/* Build one collection unit: tier pill + acrylic slab + F1 card + level bar */
function buildUnit(d) {
  const pill = TIER_PILL[d.tier] || TIER_PILL.silverstone;
  const glow = TIER_GLOW[d.tier] || '';
  const cardHTML = F1Card.buildCard(d);
  const ownedBadge = d.owned ? '<div class="col-owned-badge">★ OWNED</div>' : '';
  const lvl = d.lv ? `
    <div class="col-lv">
      <div class="col-lv-t" style="color:${pill.c}">Lv.${d.lv} · ${Math.round((d.xp||0)/Math.max(d.nxp||100,1)*100)}%</div>
      <div class="col-lv-bg">
        <div class="col-lv-f" style="width:${Math.round((d.xp||0)/Math.max(d.nxp||100,1)*100)}%;
          background:linear-gradient(90deg,${pill.c}66,${pill.c})"></div>
      </div>
    </div>` : '';

  return `
    <div class="col-unit">
      <div class="col-atag" style="background:${pill.bg};color:${pill.c};border:1px solid ${pill.bc}66">
        ${pill.label}
      </div>
      <div class="col-frame">
        <div class="col-glow" style="${glow}"></div>
        ${cardHTML}
        <div class="col-acrylic">
          <div class="col-mag tl"></div><div class="col-mag tr"></div>
          <div class="col-mag bl"></div><div class="col-mag br"></div>
        </div>
        ${ownedBadge}
      </div>
      ${lvl}
      <div class="col-alabel">${d.pts != null ? d.pts + ' pts' : (d.owned ? 'In your vault' : 'Bet to unlock')}</div>
    </div>`;
}

/* Load current season from /api/drivers */
async function loadCurrent() {
  const res  = await fetch('/api/drivers');
  const data = await res.json();
  const drivers = data.drivers || [];

  drivers.sort((a, b) => {
    const pa = a.championship_pos || 99, pb = b.championship_pos || 99;
    return pa - pb || a.name.localeCompare(b.name);
  });

  const cards = drivers.map((d, i) => {
    const pos   = d.championship_pos || (i + 1);
    const last  = d.name.split(' ').slice(-1)[0] || '?';
    const code  = last.slice(0,3).toUpperCase();
    const sw    = SW_BANK[code] || SW_DEFAULT;
    const stats = deriveStats(pos, d.wins || 0, d.points || 0, 400, 24);
    const ovr   = Math.round((stats.q + stats.t + stats.w + stats.o) / 4);
    const tier  = posTier(pos);

    return {
      num: d.number || String(pos),
      name: last, fullName: d.name,
      team: d.team || '',
      color: d.team_colour ? '#' + d.team_colour : '#888',
      tier, code,
      headshot: d.headshot_url || F1Card.LOCAL_HEADSHOT(code),
      stats, ovr,
      win: Math.round((d.wins || 0) / 24 * 100),
      odds: pos === 1 ? '2.0' : pos <= 3 ? '4.0' : pos <= 8 ? '10.0' : '25.0',
      pts2024: d.points || 0,
      str: sw.str, wk: sw.wk,
      driver_id: d.driver_id,
      owned: OWNED_CARDS.has(`${code.toLowerCase()}_2026`),
      lv: 0, xp: 0, nxp: 100,
      pts: d.points || 0,
      season: 2026, isHistorical: false,
    };
  });

  renderStats(cards, '2026 Season');
  renderGrid(cards);
}

/* Load historical season */
async function loadHistorical(year) {
  const res  = await fetch(`/api/history/standings/${year}`);
  const data = await res.json();
  const standings = data.standings || [];
  const meta = SEASON_META[year] || { races: 22 };
  const maxPts = standings.length ? standings[0].pts : 400;

  const cards = standings.map(d => {
    const sw    = SW_BANK[d.code] || SW_DEFAULT;
    const stats = deriveStats(d.pos, d.wins, d.pts, maxPts, meta.races);
    const ovr   = Math.round((stats.q + stats.t + stats.w + stats.o) / 4);
    const tier  = posTier(d.pos);
    const last  = d.name?.split(' ').slice(-1)[0] || d.code || '?';
    const code  = d.code || last.slice(0,3).toUpperCase();

    return {
      num: String(d.pos),
      name: last, fullName: d.name,
      team: d.team || '?', color: d.color || '#888',
      tier, code,
      headshot: F1Card.LOCAL_HEADSHOT(code),
      stats, ovr,
      win: Math.round(d.wins / meta.races * 100),
      odds: d.pos === 1 ? '1.5' : d.pos <= 3 ? '3.5' : d.pos <= 8 ? '9.0' : '22.0',
      pts2024: d.pts || 0,
      str: sw.str, wk: sw.wk,
      driver_id: d.driver_id,
      owned: false,
      lv: 0, xp: 0, nxp: 100,
      pts: d.pts,
      season: year, isHistorical: true,
    };
  });

  renderStats(cards, `${year} Season`);
  renderGrid(cards);
}

function renderStats(cards, label) {
  const owned  = cards.filter(c => c.owned).length;
  const monaco = cards.filter(c => c.tier === 'monaco').length;
  const spa    = cards.filter(c => c.tier === 'spa').length;
  const suzuka = cards.filter(c => c.tier === 'suzuka').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="col-stat-pill"><div class="csp-num">${cards.length}</div><div class="csp-label">${label.toUpperCase()}</div></div>
    <div class="col-stat-pill"><div class="csp-num" style="color:#c9a84c">${monaco}</div><div class="csp-label">LEGENDARY</div></div>
    <div class="col-stat-pill"><div class="csp-num" style="color:#00ccff">${spa}</div><div class="csp-label">HOLOGRAPHIC</div></div>
    <div class="col-stat-pill"><div class="csp-num" style="color:#AFA9EC">${suzuka}</div><div class="csp-label">RARE</div></div>
    ${owned ? `<div class="col-stat-pill" style="margin-left:auto"><div class="csp-num" style="color:#e8ff00">${owned}</div><div class="csp-label">OWNED</div></div>` : ''}
  `;
}

function renderGrid(cards) {
  document.getElementById('albumGrid').innerHTML = cards.map(buildUnit).join('');
  attachTilt();
}

async function buildTabs() {
  const bar = document.getElementById('seasonBar');
  const years = [2026, 2025, 2024, 2023, 2022, 2021, 2020];
  bar.innerHTML = years.map((y, i) => {
    const m = SEASON_META[y] || {};
    const active = i === 0 ? 'active' : '';
    const year = y === 2026 ? '2026' : String(y);
    const sub = y === 2026 ? 'Current' : `Champion: ${m.champ || '—'}`;
    return `<button class="s-tab ${active}" data-season="${y}" onclick="switchSeason(${y},this)">${year}<span class="s-champ">${sub}</span></button>`;
  }).join('');
}

function switchSeason(year, el) {
  document.querySelectorAll('.s-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('albumGrid').innerHTML = '<div class="col-loading">LOADING DRIVERS…</div>';
  if (year === 2026) loadCurrent();
  else loadHistorical(year);
}

/* 3D tilt on hover */
const MAX_TILT = 18, PERSPECTIVE = 600;
function attachTilt() {
  document.querySelectorAll('.col-unit').forEach(unit => {
    const frame = unit.querySelector('.col-frame');
    if (!frame) return;
    let raf = null;
    unit.addEventListener('mousemove', e => {
      const r  = frame.getBoundingClientRect();
      const dx = ((e.clientX - r.left) / r.width  - 0.5) * 2;
      const dy = ((e.clientY - r.top)  / r.height - 0.5) * 2;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        frame.style.transition = 'transform .08s ease';
        frame.style.transform  = `perspective(${PERSPECTIVE}px) rotateY(${dx*MAX_TILT}deg) rotateX(${-dy*MAX_TILT}deg) translateY(-16px) scale(1.05)`;
      });
    });
    unit.addEventListener('mouseleave', () => {
      cancelAnimationFrame(raf);
      frame.style.transition = 'transform .55s cubic-bezier(.25,.8,.25,1)';
      frame.style.transform  = '';
    });
  });
}

buildTabs().then(() => loadCurrent());
