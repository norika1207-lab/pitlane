<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitLane — 賽車預測卡牌平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/assets/css/style.css">
<style>
/* ─── COMPACT HERO ─── */
.hero-compact {
  padding: 72px 0 12px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero-compact::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(232,255,0,0.03) 0%, transparent 60%);
}
.hero-row {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; flex-wrap: wrap;
  position: relative; z-index: 2;
}
.hero-logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem; font-weight: 900;
  color: var(--gold); letter-spacing: 0.12em;
  text-transform: uppercase;
}
.hero-divider { width: 1px; height: 24px; background: var(--border); }
.hero-slogan {
  font-size: 0.95rem; color: var(--text-secondary);
  font-weight: 500;
}
.hero-slogan em { color: var(--gold); font-style: normal; font-weight: 700; }
.hero-cta {
  display: flex; gap: 8px; align-items: center;
}

/* ─── CAROUSEL V2 ─── */
.carousel-section {
  padding: 16px 0 32px;
  position: relative;
  overflow: hidden;
}
.carousel-wrap {
  position: relative; padding: 0 60px;
  user-select: none; max-width: 1200px;
  margin: 0 auto;
}
.carousel-stage {
  display: flex; justify-content: center; align-items: center;
  height: 380px; position: relative; perspective: 1200px;
}
.carousel-card {
  position: absolute; width: 260px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
  transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  cursor: pointer; transform-style: preserve-3d;
}
.carousel-card .cc-team-stripe {
  position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  border-radius: 8px 0 0 8px;
}
.carousel-card .cc-top {
  padding: 16px 16px 0 22px;
  display: flex; align-items: center; gap: 12px; position: relative;
}
.carousel-card .cc-ghost {
  position: absolute; top: 4px; right: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 3.5rem; font-weight: 900;
  color: rgba(232,255,0,0.04); line-height: 1; pointer-events: none;
}
.carousel-card .cc-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  object-fit: cover; border: 2px solid var(--border);
  background: var(--bg-secondary); flex-shrink: 0;
}
.carousel-card .cc-avatar-fb {
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(232,255,0,0.06); border: 2px solid var(--border-gold);
  display: none; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem; font-weight: 800; color: var(--gold); flex-shrink: 0;
}
.carousel-card .cc-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.05rem; font-weight: 700; color: var(--text-primary); line-height: 1.2;
}
.carousel-card .cc-team { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }
.carousel-card .cc-stats {
  padding: 12px 22px 0;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 14px;
  opacity: 0; max-height: 0; transition: opacity 0.4s, max-height 0.4s; overflow: hidden;
}
.carousel-card.is-center .cc-stats { opacity: 1; max-height: 200px; }
.cc-stat-item {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cc-stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
}
.cc-stat-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem; font-weight: 700; color: var(--gold);
}
.carousel-card .cc-skills {
  padding: 8px 22px 0; display: flex; flex-wrap: wrap; gap: 3px;
  opacity: 0; max-height: 0; transition: opacity 0.4s 0.1s, max-height 0.4s; overflow: hidden;
}
.carousel-card.is-center .cc-skills { opacity: 1; max-height: 80px; }
.cc-skill-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem; font-weight: 600; padding: 2px 6px; border-radius: 3px;
  background: rgba(232,255,0,0.06); border: 1px solid rgba(232,255,0,0.12);
  color: var(--gold); text-transform: uppercase; letter-spacing: 0.04em;
}
.cc-skill-tag.passive {
  background: rgba(0,176,255,0.08); border-color: rgba(0,176,255,0.2); color: var(--blue);
}
.carousel-card .cc-footer {
  padding: 10px 22px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.cc-ovr {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem; font-weight: 900; color: var(--gold); line-height: 1;
}
.cc-ovr-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.5rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
}
.cc-bet-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  padding: 6px 14px; border-radius: 4px;
  background: var(--gold); color: var(--bg-primary); border: none; cursor: pointer;
  transition: all 0.15s; opacity: 0; transform: translateY(4px);
}
.carousel-card.is-center .cc-bet-btn { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }
.cc-bet-btn:hover { box-shadow: 0 0 16px rgba(232,255,0,0.3); }
.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 10;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-secondary);
  color: var(--gold); font-size: 1.4rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: sans-serif; line-height: 1;
}
.carousel-prev { left: 0; }
.carousel-next { right: 0; }
.carousel-arrow:hover { background: rgba(232,255,0,0.08); border-color: var(--border-gold); }
.carousel-dots {
  display: flex; gap: 5px; justify-content: center; margin-top: 12px;
}
.carousel-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted); border: none; cursor: pointer;
  transition: all 0.3s; padding: 0;
}
.carousel-dot.active {
  background: var(--gold); box-shadow: 0 0 6px rgba(232,255,0,0.4);
  width: 20px; border-radius: 3px;
}

/* ─── DASHBOARD ─── */
.dash-section { padding: 20px 0 40px; }
.dash-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.gauge-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px 16px 16px;
  text-align: center; position: relative; overflow: hidden;
}
.gauge-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
}
.gauge-card.g-speed::before { background: var(--gold); }
.gauge-card.g-pos::before { background: var(--red); }
.gauge-card.g-fuel::before { background: var(--green); }
.gauge-card.g-pressure::before { background: var(--blue); }
.gauge-svg { width: 100%; max-width: 140px; height: auto; margin: 0 auto 8px; display: block; }
.gauge-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.12em;
  margin-bottom: 4px;
}
.gauge-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.8rem; font-weight: 800; line-height: 1;
}
.gauge-unit {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; color: var(--text-muted); margin-top: 2px;
}

/* ─── CHARTS ROW ─── */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-bottom: 24px;
}
.chart-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px; position: relative; overflow: hidden;
}
.chart-box::before {
  content: ''; position: absolute; inset: 0;
  background: var(--scanline); opacity: 0.2; pointer-events: none;
}
.chart-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted); margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.chart-title .live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  display: inline-block; animation: pulse 1.5s infinite;
}
.chart-canvas { width: 100%; position: relative; }
.chart-canvas svg { width: 100%; height: 100%; }

/* Bar chart */
.bar-group { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding-top: 8px; }
.bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.bar-fill {
  width: 100%; border-radius: 3px 3px 0 0;
  transition: height 1s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.bar-fill::after {
  content: ''; position: absolute; inset: 0;
  background: var(--scanline); opacity: 0.3;
}
.bar-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem; color: var(--text-muted); text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 50px;
}
.bar-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; color: var(--text-secondary);
}

/* ─── TRACK MINI ─── */
.track-mini {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px;
}
.track-mini-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.track-mini-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem; font-weight: 700;
}
.track-mini-type {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem; padding: 3px 8px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.track-mini-type.street { background: rgba(225,6,0,0.12); color: var(--red); }
.track-mini-type.high_speed { background: rgba(0,210,190,0.12); color: var(--green); }
.track-mini-type.technical { background: rgba(160,32,240,0.12); color: var(--purple); }
.track-mini-body {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.track-mini-stat { text-align: center; }
.track-mini-stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem; font-weight: 800; color: var(--text-primary);
}
.track-mini-stat-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.track-chars-list {
  grid-column: 1 / -1;
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
}
.track-char-tag {
  font-size: 0.65rem; padding: 3px 8px; border-radius: 3px;
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-secondary);
}

/* ─── BOTTOM ACTIONS ─── */
.bottom-actions {
  display: flex; gap: 14px; justify-content: center; padding: 24px 0 40px;
}
.action-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 24px 32px; text-align: center;
  flex: 1; max-width: 280px; transition: all 0.2s; cursor: pointer;
}
.action-card:hover { border-color: var(--border-gold); transform: translateY(-2px); }
.action-card-icon { font-size: 1.8rem; margin-bottom: 8px; }
.action-card h3 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem; font-weight: 700; margin-bottom: 4px;
}
.action-card p { font-size: 0.75rem; color: var(--text-secondary); }

@media (max-width: 768px) {
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .carousel-stage { height: 340px; }
  .carousel-card { width: 220px; }
  .bottom-actions { flex-direction: column; align-items: center; }
}
</style>

<script>
// ═══════════════════════════════════════
// GAUGE SVG GENERATOR
// ═══════════════════════════════════════
function renderGaugeSVG(value, max, color, label) {
  const pct = Math.min(value / max, 1);
  const angle = pct * 240; // 240 degree arc
  const startAngle = 150; // start from bottom-left
  const r = 52;
  const cx = 65, cy = 65;

  function polarToCart(deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  // Background arc
  const bgStart = polarToCart(startAngle);
  const bgEnd = polarToCart(startAngle + 240);
  // Value arc
  const valEnd = polarToCart(startAngle + angle);
  const largeArc = angle > 180 ? 1 : 0;
  const bgLargeArc = 1;

  // Tick marks
  let ticks = '';
  for (let i = 0; i <= 8; i++) {
    const tickAngle = startAngle + (240 / 8) * i;
    const inner = polarToCart(tickAngle);
    const outerR = r + 6;
    const outerRad = (tickAngle - 90) * Math.PI / 180;
    const outer = { x: cx + outerR * Math.cos(outerRad), y: cy + outerR * Math.sin(outerRad) };
    ticks += `<line x1="${inner.x}" y1="${inner.y}" x2="${outer.x}" y2="${outer.y}" stroke="${i <= pct * 8 ? color : 'rgba(255,255,255,0.1)'}" stroke-width="1.5"/>`;
  }

  // Needle
  const needleAngle = startAngle + angle;
  const needleEnd = polarToCart(needleAngle);
  const needleR = r - 14;
  const needleRad = (needleAngle - 90) * Math.PI / 180;
  const needleTip = { x: cx + needleR * Math.cos(needleRad), y: cy + needleR * Math.sin(needleRad) };

  return `<svg viewBox="0 0 130 100" class="gauge-svg">
    <!-- bg arc -->
    <path d="M${bgStart.x},${bgStart.y} A${r},${r} 0 ${bgLargeArc},1 ${bgEnd.x},${bgEnd.y}"
          fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8" stroke-linecap="round"/>
    <!-- value arc -->
    ${angle > 0 ? `<path d="M${bgStart.x},${bgStart.y} A${r},${r} 0 ${largeArc},1 ${valEnd.x},${valEnd.y}"
          fill="none" stroke="${color}" stroke-width="8" stroke-linecap="round"
          style="filter:drop-shadow(0 0 6px ${color}40)"/>` : ''}
    ${ticks}
    <!-- center dot -->
    <circle cx="${cx}" cy="${cy}" r="4" fill="${color}" opacity="0.8"/>
    <!-- needle -->
    <line x1="${cx}" y1="${cy}" x2="${needleTip.x}" y2="${needleTip.y}"
          stroke="${color}" stroke-width="2" stroke-linecap="round"/>
  </svg>`;
}

// ═══════════════════════════════════════
// LOAD DASHBOARD
// ═══════════════════════════════════════
async function loadDashboard() {
  try {
    const [raceRes, driversRes, oddsRes, analysisRes] = await Promise.allSettled([
      api('/api/races/current'),
      api('/api/drivers'),
      api('/api/races/x/odds'),
      api('/api/races/x/analysis'),
    ]);

    const race = raceRes.status === 'fulfilled' ? raceRes.value : {};
    const drivers = driversRes.status === 'fulfilled' ? (driversRes.value.drivers || []) : [];
    const odds = oddsRes.status === 'fulfilled' ? (oddsRes.value.odds || []) : [];
    const analysis = analysisRes.status === 'fulfilled' ? analysisRes.value : {};

    // ── GAUGES ──
    const raceDate = new Date(race.date || Date.now());
    const daysLeft = Math.max(0, Math.floor((raceDate - new Date()) / 86400000));
    const topOdds = odds[0]?.winner_odds || 2.0;
    const topProb = odds[0]?.win_probability || 50;
    const totalDrivers = drivers.length || 20;

    const el = document.getElementById('dash-gauges');
    el.innerHTML = `
      <div class="gauge-card g-speed">
        ${renderGaugeSVG(daysLeft, 14, '#e8ff00', 'days')}
        <div class="gauge-label">Next Race</div>
        <div class="gauge-value" style="color:var(--gold)">${daysLeft}</div>
        <div class="gauge-unit">${race.race_name || '---'}</div>
      </div>
      <div class="gauge-card g-pos">
        ${renderGaugeSVG(topProb, 100, '#E10600', 'prob')}
        <div class="gauge-label">Top Favourite</div>
        <div class="gauge-value" style="color:var(--red)">${topProb}%</div>
        <div class="gauge-unit">${odds[0]?.name?.split(' ').pop() || '---'} x${topOdds}</div>
      </div>
      <div class="gauge-card g-fuel">
        ${renderGaugeSVG(totalDrivers, 24, '#00D2BE', 'drivers')}
        <div class="gauge-label">Drivers</div>
        <div class="gauge-value" style="color:var(--green)">${totalDrivers}</div>
        <div class="gauge-unit">${race.circuit_type || 'Loading'}</div>
      </div>
      <div class="gauge-card g-pressure">
        ${renderGaugeSVG(odds.length, 22, '#00b0ff', 'market')}
        <div class="gauge-label">Market Odds</div>
        <div class="gauge-value" style="color:var(--blue)">${odds.length}</div>
        <div class="gauge-unit">Active Entries</div>
      </div>
    `;

    // ── ODDS BAR CHART ──
    const barsEl = document.getElementById('odds-bars');
    const topN = odds.slice(0, 8);
    const maxProb = Math.max(...topN.map(o => o.win_probability), 1);
    const teamColors = {'McLaren':'#F47600','Red Bull Racing':'#3671C6','Ferrari':'#E8002D','Mercedes':'#27F4D2','Aston Martin':'#358C75','Alpine':'#FF87BC','Williams':'#64C4FF','Haas':'#B6BABD','Racing Bulls':'#6692FF','Audi':'#52E252'};

    barsEl.innerHTML = topN.map(o => {
      const h = (o.win_probability / maxProb) * 100;
      const color = teamColors[o.team] || 'var(--gold)';
      const lastName = o.name?.split(' ').pop() || '?';
      return `<div class="bar-item">
        <div class="bar-val">${o.win_probability}%</div>
        <div class="bar-fill" style="height:${h}%;background:${color}"></div>
        <div class="bar-label">${lastName}</div>
      </div>`;
    }).join('');

    // ── RADAR CHART (top driver) ──
    const radarEl = document.getElementById('radar-canvas');
    if (drivers[0]) {
      try {
        const card = await api(`/api/drivers/${drivers[0].driver_id}/card`);
        const s = card.stats || {};
        const dims = [
          {label:'SPD', val:s.qualifying||50},
          {label:'TYRE', val:s.tire_management||50},
          {label:'WET', val:s.wet_weather||50},
          {label:'OVT', val:s.overtaking||50},
          {label:'STR', val:s.street_circuit||50},
        ];
        const cx=100,cy=80,r=60;
        let polyPoints = '';
        let labels = '';
        let axes = '';
        dims.forEach((d,i) => {
          const angle = (i / dims.length) * Math.PI * 2 - Math.PI/2;
          const px = cx + r * (d.val/100) * Math.cos(angle);
          const py = cy + r * (d.val/100) * Math.sin(angle);
          polyPoints += `${px},${py} `;
          const lx = cx + (r+16) * Math.cos(angle);
          const ly = cy + (r+16) * Math.sin(angle);
          labels += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--text-muted)" font-size="7" font-family="Share Tech Mono">${d.label} ${d.val}</text>`;
          axes += `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(angle)}" y2="${cy+r*Math.sin(angle)}" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>`;
        });
        // Grid rings
        let rings = '';
        [0.25,0.5,0.75,1].forEach(s => {
          let pts='';
          dims.forEach((_,i)=>{
            const a=(i/dims.length)*Math.PI*2-Math.PI/2;
            pts+=`${cx+r*s*Math.cos(a)},${cy+r*s*Math.sin(a)} `;
          });
          rings+=`<polygon points="${pts}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
        });

        radarEl.innerHTML = `<svg viewBox="0 0 200 160" style="width:100%;height:100%">
          ${rings}${axes}
          <polygon points="${polyPoints}" fill="rgba(232,255,0,0.1)" stroke="var(--gold)" stroke-width="1.5" stroke-linejoin="round"/>
          ${labels}
          <text x="${cx}" y="155" text-anchor="middle" fill="var(--text-secondary)" font-size="8" font-family="Barlow Condensed" font-weight="600">${card.name || 'Driver'}</text>
        </svg>`;
      } catch(e) {
        radarEl.innerHTML = '<p style="color:var(--text-muted);font-size:0.75rem;text-align:center;padding:40px 0">數據載入中...</p>';
      }
    }

    // ── TRACK CARD ──
    const trackEl = document.getElementById('track-card');
    try {
      const track = await api(`/api/tracks/${encodeURIComponent(race.circuit || 'Jeddah')}`);
      const typeClass = track.type || 'technical';
      const typeMap = {street:'街道賽', high_speed:'高速賽道', technical:'技術賽道'};
      trackEl.innerHTML = `
        <div class="track-mini-header">
          <span class="track-mini-name">${track.name_zh || race.circuit || '---'}</span>
          <span class="track-mini-type ${typeClass}">${typeMap[typeClass] || typeClass}</span>
        </div>
        <div class="track-mini-body">
          <div class="track-mini-stat">
            <div class="track-mini-stat-val">${track.difficulty || '?'}<span style="font-size:0.8rem;color:var(--text-muted)">/10</span></div>
            <div class="track-mini-stat-label">難度</div>
          </div>
          <div class="track-mini-stat">
            <div class="track-mini-stat-val">${track.overtaking || '?'}<span style="font-size:0.8rem;color:var(--text-muted)">/10</span></div>
            <div class="track-mini-stat-label">超車機會</div>
          </div>
          <div class="track-chars-list">
            ${(track.characteristics || []).map(c => `<span class="track-char-tag">${c}</span>`).join('')}
          </div>
          <div style="grid-column:1/-1;margin-top:6px;font-size:0.75rem;color:var(--text-secondary);border-top:1px solid var(--border);padding-top:8px">
            <strong style="color:var(--gold)">策略建議：</strong>${track.strategy || '---'}
          </div>
        </div>`;
    } catch(e) {
      trackEl.innerHTML = '<p style="color:var(--text-muted);padding:20px;font-size:0.8rem">賽道資料載入中...</p>';
    }

    // ── AI ANALYSIS ──
    const aiEl = document.getElementById('ai-content');
    if (analysis.top_picks) {
      const tp = analysis.top_picks || [];
      const dh = analysis.dark_horse || {};
      aiEl.innerHTML = `
        <div style="margin-bottom:10px">
          <div style="font-family:'Barlow Condensed';font-weight:700;color:var(--gold);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px">推薦車手</div>
          ${tp.map((p,i) => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">
            <span>${i+1}. ${p.driver}</span>
            <span style="color:var(--gold);font-family:'Share Tech Mono';font-size:0.75rem">${p.confidence}%</span>
          </div>`).join('')}
        </div>
        <div style="margin-bottom:8px">
          <span style="font-family:'Barlow Condensed';font-weight:700;color:var(--red);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em">黑馬</span>
          <span style="margin-left:8px">${dh.driver || '?'}</span>
        </div>
        <div style="font-size:0.72rem;color:var(--text-muted);border-top:1px solid var(--border);padding-top:6px">
          ${analysis.one_liner || analysis.key_factor || ''}
        </div>
        ${analysis.source === 'data_analysis' ? '<div style="font-size:0.6rem;color:var(--text-muted);margin-top:4px">⚡ 基於歷史數據分析</div>' : ''}
      `;
    } else {
      aiEl.innerHTML = '<p style="color:var(--text-muted);font-size:0.75rem">分析資料暫不可用</p>';
    }

  } catch(e) {
    console.error('Dashboard error:', e);
  }
}

// ═══════════════════════════════════════
// CAROUSEL (same logic as before)
// ═══════════════════════════════════════
let carouselCards = [];
let carouselIdx = 0;
let carouselTimer = null;

async function loadCarousel() {
  try {
    const data = await api('/api/drivers');
    const drivers = (data.drivers || []).slice(0, 10);
    if (!drivers.length) return;
    const cards = await Promise.all(
      drivers.map(d => api(`/api/drivers/${d.driver_id}/card`).catch(() => null))
    );
    carouselCards = drivers.map((d, i) => {
      const card = cards[i];
      const s = card?.stats || {};
      const sk = card?.skills || {};
      return {
        id: d.driver_id, name: d.name || '', number: d.number || '',
        team: card?.team || d.team || '',
        teamColour: card?.team_colour || d.team_colour || 'e8ff00',
        headshot: card?.headshot_url || d.headshot_url || '',
        overall: s.overall || 50, odds: card?.odds || 5.0,
        winProb: card?.odds ? Math.round(1 / card.odds * 100) : 20,
        qualifying: s.qualifying||50, tireMgmt: s.tire_management||50,
        wetWeather: s.wet_weather||50, overtaking: s.overtaking||50,
        passive: sk.passive?.name || '',
        skills: (sk.skills || []).map(x => `${x.name} ${'★'.repeat(x.stars)}`),
      };
    });
    renderCarousel();
    carouselTimer = setInterval(carouselNext, 4000);
  } catch(e) {}
}

function renderCarousel() {
  const stage = document.getElementById('carousel-stage');
  const dotsEl = document.getElementById('carousel-dots');
  if (!stage || !carouselCards.length) return;
  const total = carouselCards.length;
  const half = 2;
  let html = '';
  for (let offset = -half; offset <= half; offset++) {
    const idx = ((carouselIdx + offset) % total + total) % total;
    const c = carouselCards[idx];
    const isCenter = offset === 0;
    const absOff = Math.abs(offset);
    const tx = offset * 200;
    const scale = isCenter ? 1 : Math.max(0.72, 1 - absOff * 0.14);
    const opacity = isCenter ? 1 : Math.max(0.35, 1 - absOff * 0.3);
    const z = 10 - absOff;
    const rotY = offset * -3;
    html += `
      <div class="carousel-card ${isCenter ? 'is-center' : ''}"
           style="transform:translateX(${tx}px) scale(${scale}) rotateY(${rotY}deg);opacity:${opacity};z-index:${z};
                  ${isCenter ? 'box-shadow:0 6px 30px rgba(232,255,0,0.06),0 0 0 1px rgba(232,255,0,0.08);' : ''}"
           ${isCenter ? 'onmouseenter="clearInterval(carouselTimer)" onmouseleave="carouselTimer=setInterval(carouselNext,4000)"' : `onclick="carouselIdx=${idx};renderCarousel()"`}>
        <div class="cc-team-stripe" style="background:#${c.teamColour}"></div>
        <div class="cc-top">
          <span class="cc-ghost">${c.number}</span>
          <img class="cc-avatar" src="${c.headshot}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="cc-avatar-fb">#${c.number}</div>
          <div><div class="cc-name">${c.name}</div><div class="cc-team">${c.team}</div></div>
        </div>
        <div class="cc-stats">
          <div class="cc-stat-item"><span class="cc-stat-label">Win</span><span class="cc-stat-val">${c.winProb}%</span></div>
          <div class="cc-stat-item"><span class="cc-stat-label">Odds</span><span class="cc-stat-val">x${c.odds}</span></div>
          <div class="cc-stat-item"><span class="cc-stat-label">Qual</span><span class="cc-stat-val">${c.qualifying}</span></div>
          <div class="cc-stat-item"><span class="cc-stat-label">Tyre</span><span class="cc-stat-val">${c.tireMgmt}</span></div>
          <div class="cc-stat-item"><span class="cc-stat-label">Wet</span><span class="cc-stat-val">${c.wetWeather}</span></div>
          <div class="cc-stat-item"><span class="cc-stat-label">Ovt</span><span class="cc-stat-val">${c.overtaking}</span></div>
        </div>
        <div class="cc-skills">
          ${c.passive ? `<span class="cc-skill-tag passive">${c.passive}</span>` : ''}
          ${c.skills.slice(0,2).map(s => `<span class="cc-skill-tag">${s}</span>`).join('')}
        </div>
        ${isCenter ? `<div style="padding:0 14px;text-align:center;max-height:60px;overflow:hidden">
          <img src="${getCarImage(c.team)}" alt="${c.team}" style="width:100%;max-height:50px;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(232,255,0,0.12))">
        </div>` : ''}
        <div class="cc-footer">
          <div><div class="cc-ovr">${c.overall}</div><div class="cc-ovr-label">Overall</div></div>
          <button class="cc-bet-btn" onclick="event.stopPropagation();location.href='/race?pick=${c.id}'">押這個人 →</button>
        </div>
      </div>`;
  }
  stage.innerHTML = html;
  dotsEl.innerHTML = carouselCards.map((_, i) =>
    `<button class="carousel-dot ${i === carouselIdx ? 'active' : ''}" onclick="carouselIdx=${i};renderCarousel()"></button>`
  ).join('');
}

function carouselNext() { carouselIdx = (carouselIdx + 1) % carouselCards.length; renderCarousel(); }
function carouselPrev() { carouselIdx = (carouselIdx - 1 + carouselCards.length) % carouselCards.length; renderCarousel(); }

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadCarousel();
loadDashboard();
</script>
</body>
</html>
